<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데일리 트래커</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
:root{
  --ink:#1c2620;--paper:#f5f1e8;--card:#fffdf8;--green:#2f5d3a;--green-d:#234a2d;
  --accent:#d98324;--accent-soft:#f6e4cf;--line:#d9d3c4;--muted:#6b7269;--blue:#3a5a6b;
  --c0:#ece7da;--c1:#cfe0cd;--c2:#9cc19b;--c3:#5e9462;--c4:#2f5d3a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
  line-height:1.5;padding:24px 16px 70px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:720px;margin:0 auto;}

.head{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
.kicker{font-size:11px;letter-spacing:.26em;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
.head h1{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.head h1 span{color:var(--green);}

/* tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab{flex:1;padding:11px;border:2px solid var(--ink);border-radius:12px;background:transparent;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);transition:.15s;}
.tab.active{background:var(--ink);color:var(--paper);}

/* date nav */
.datenav{display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:16px;}
.datenav button{border:none;background:var(--green-soft,#e2ecdf);color:var(--green);width:34px;height:34px;
  border-radius:9px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;}
.datenav button:hover{background:#d0e0cd;}
.datenav .dlabel{text-align:center;}
.datenav .dlabel .d1{font-size:16px;font-weight:800;}
.datenav .dlabel .d2{font-size:11px;color:var(--muted);font-weight:600;}
.datenav .today-btn{font-size:11px;width:auto;padding:0 12px;height:30px;border-radius:100px;background:var(--accent-soft);color:#9c5a14;}

/* progress ring */
.toprow{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:16px 18px;margin-bottom:16px;}
.ring{position:relative;width:78px;height:78px;flex-shrink:0;}
.ring svg{transform:rotate(-90deg);}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .pct b{font-size:20px;font-weight:800;color:var(--green);line-height:1;}
.ring .pct small{font-size:9px;color:var(--muted);}
.topinfo{flex:1;}
.topinfo .ti1{font-size:14px;font-weight:800;}
.topinfo .ti2{font-size:12px;color:var(--muted);margin-top:2px;}
.weightbox{display:flex;align-items:center;gap:8px;margin-top:10px;}
.weightbox label{font-size:12px;font-weight:700;color:var(--muted);}
.weightbox input{width:80px;border:1.5px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);text-align:right;background:#fff;}
.weightbox input:focus{outline:none;border-color:var(--green);}
.weightbox .kg{font-size:12px;font-weight:700;color:var(--muted);}
.weightbox .delta{font-size:11px;font-weight:700;margin-left:4px;}
.delta.down{color:#2f7d4f;}.delta.up{color:#c0563a;}

/* checklist */
.sec-h{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin:18px 0 8px;text-transform:uppercase;}
.item{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:.12s;user-select:none;}
.item:hover{border-color:#bcb5a3;}
.item.done{background:#eef4ec;border-color:#bcd6ba;}
.cb{width:24px;height:24px;border:2px solid var(--line);border-radius:7px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.12s;margin-top:1px;}
.item.done .cb{background:var(--green);border-color:var(--green);}
.item .lab{font-size:14px;font-weight:600;}
.item.done .lab{color:var(--muted);}
.item .lab .sub{display:block;font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px;}
.item.time-item{cursor:default;}
.item.time-item:hover{border-color:var(--line);}
.item .timein{margin-left:auto;border:1.5px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);background:#fff;}
.item .timein:focus{outline:none;border-color:var(--green);}

.notebox{margin-top:16px;}
.notebox textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;
  font-family:inherit;font-size:13px;resize:vertical;min-height:60px;background:#fff;color:var(--ink);}
.notebox textarea:focus{outline:none;border-color:var(--green);}
.notebox .nl{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}

.savetag{font-size:11px;color:var(--muted);text-align:right;margin-top:6px;height:14px;transition:.2s;}

/* RECORD tab */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
.scard .sv{font-size:24px;font-weight:800;color:var(--green);line-height:1;}
.scard .sv small{font-size:12px;color:var(--muted);}
.scard .sl{font-size:11px;color:var(--muted);font-weight:600;margin-top:5px;}
.scard.fire .sv{color:var(--accent);}

.block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;}
.block h3{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* heatmap */
.hm-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.hm-head div{font-size:10px;font-weight:700;color:var(--muted);text-align:center;}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cell{aspect-ratio:1;border-radius:7px;background:var(--c0);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#8a9285;position:relative;}
.cell.future{opacity:.3;}
.cell.today{box-shadow:0 0 0 2px var(--accent);}
.cell.l1{background:var(--c1);}.cell.l2{background:var(--c2);color:#3a523c;}
.cell.l3{background:var(--c3);color:#eaf3e8;}.cell.l4{background:var(--c4);color:#eaf3e8;}
.legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:10px;font-size:10px;color:var(--muted);}
.legend i{width:13px;height:13px;border-radius:4px;display:inline-block;}

/* weight chart */
.wstat{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.wstat .big{font-size:22px;font-weight:800;color:var(--green);}
.wstat .big small{font-size:12px;color:var(--muted);font-weight:600;}
.wchart{width:100%;height:120px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}

.danger{margin-top:24px;text-align:center;}
.danger button{background:transparent;border:1px solid #d9b3a8;color:#b5573f;font-family:inherit;
  font-size:12px;font-weight:600;padding:8px 16px;border-radius:100px;cursor:pointer;}
.danger button:hover{background:#f7e9e4;}

.hidden{display:none;}
.loading{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">Daily Routine Tracker</div>
    <h1>데일리 <span>체크 &amp; 기록</span></h1>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-today" onclick="switchTab('today')">✓ 오늘 체크</button>
    <button class="tab" id="tab-record" onclick="switchTab('record')">📊 기록 보기</button>
  </div>

  <!-- ============ TODAY ============ -->
  <div id="view-today">
    <div class="datenav">
      <button onclick="changeDate(-1)">‹</button>
      <div class="dlabel">
        <div class="d1" id="dateMain">—</div>
        <div class="d2" id="dateSub">—</div>
      </div>
      <button onclick="changeDate(1)">›</button>
    </div>
    <div style="text-align:center;margin:-8px 0 14px;">
      <button class="today-btn" style="border:none;background:var(--accent-soft);color:#9c5a14;height:28px;border-radius:100px;font-family:inherit;font-size:11px;font-weight:700;padding:0 14px;cursor:pointer;" onclick="goToday()">오늘로</button>
    </div>

    <div class="toprow">
      <div class="ring">
        <svg width="78" height="78"><circle cx="39" cy="39" r="33" fill="none" stroke="#e7e1d2" stroke-width="9"/>
        <circle id="ringFg" cx="39" cy="39" r="33" fill="none" stroke="#2f5d3a" stroke-width="9" stroke-linecap="round" stroke-dasharray="207.3" stroke-dashoffset="207.3"/></svg>
        <div class="pct"><b id="pctNum">0%</b><small id="pctCnt">0/0</small></div>
      </div>
      <div class="topinfo">
        <div class="ti1" id="dayTypeLabel">평일 루틴</div>
        <div class="ti2" id="encourage">오늘도 한 칸씩 채워봐요 💪</div>
        <div class="weightbox">
          <label>아침 몸무게</label>
          <input type="number" id="weightInput" step="0.1" placeholder="—" inputmode="decimal">
          <span class="kg">kg</span>
          <span class="delta" id="weightDelta"></span>
        </div>
      </div>
    </div>

    <div id="checklist"></div>

    <div class="notebox">
      <div class="nl">📝 오늘 메모 (컨디션·식사·운동 등)</div>
      <textarea id="noteInput" placeholder="예: 점심 회식으로 밥 많이 먹음. 저녁 가볍게 / 운동 가슴+삼두 / 컨디션 좋음"></textarea>
    </div>
    <div class="savetag" id="saveTag"></div>
  </div>

  <!-- ============ RECORD ============ -->
  <div id="view-record" class="hidden">
    <div id="recordBody"><div class="loading">기록 불러오는 중…</div></div>
  </div>

</div>

<script>
// 저장소: Claude 아티팩트 안에서는 window.storage, 폰 브라우저(Safari 등)에서는 localStorage 사용
const STORE = window.storage || (function(){
  return {
    get:   async (k)        => { const v=localStorage.getItem(k); return v===null?null:{key:k,value:v}; },
    set:   async (k,val)    => { localStorage.setItem(k,val); return {key:k,value:val}; },
    delete:async (k)        => { localStorage.removeItem(k); return {key:k,deleted:true}; },
    list:  async (prefix='')=> { const keys=[]; for(let i=0;i<localStorage.length;i++){const kk=localStorage.key(i); if(kk.startsWith(prefix)) keys.push(kk);} return {keys}; }
  };
})();

// ---------- routine definitions ----------
const SETS = {
  weekday: {label:'평일 루틴', items:[
    {s:'🌅 아침', id:'wake', l:'기상 시간', sub:'오늘 일어난 시각', time:true},
    {s:'🌅 아침', id:'wt', l:'몸무게 측정', sub:'화장실 후·공복·같은 옷', weight:true},
    {s:'🌅 아침', id:'amsup', l:'소금물 + 공복 영양제', sub:'유산균 → 비타민 B·C → NMN'},
    {s:'🌅 아침', id:'stretch', l:'가벼운 스트레칭', sub:'목·어깨·고관절 5~10분'},
    {s:'🌅 아침', id:'breakfast', l:'아침 식사 + 오메가3', sub:'단백질 위주 ~33g · 오메가3는 식후'},
    {s:'☀️ 낮', id:'lunch', l:'점심 (구내식당)', sub:'단백질 먼저 + 밥 2/3 · ~40g'},
    {s:'☀️ 낮', id:'walk', l:'점심 후 10분 산책'},
    {s:'☀️ 낮', id:'snack', l:'오후 간식', sub:'견과 한 줌 + 삶은 계란 2개 · ~18g'},
    {s:'🏋️ 저녁·운동', id:'dinner', l:'저녁 식사', sub:'요일별 로테이션 · ~45g'},
    {s:'🏋️ 저녁·운동', id:'workout', l:'근력 운동 1.5시간', sub:'물 + (땀 많으면) 전해질'},
    {s:'🏋️ 저녁·운동', id:'post', l:'운동 후 보충', sub:'셰이크 + 크레아틴 5g + 바나나 ½'},
    {s:'🌙 취침 전', id:'mag', l:'마그네슘', sub:'취침 30~45분 전'},
    {s:'🌙 취침 전', id:'prep', l:'내일 준비', sub:'약통·계란·견과·가방·옷'},
    {s:'🌙 취침 전', id:'sleep', l:'자정 취침', sub:'수면 7시간 확보'},
  ]},
  sat: {label:'토요일 · 액티브 (운동 O)', items:[
    {s:'🌅 아침', id:'wake', l:'기상 시간', sub:'주말엔 조금 더 늦어도 OK', time:true},
    {s:'🌅 아침', id:'wt', l:'몸무게 측정', weight:true},
    {s:'🌅 아침', id:'amsup', l:'소금물 + 공복 영양제', sub:'유산균·B·C·NMN'},
    {s:'🍳 브런치', id:'brunch', l:'브런치 + 오메가3', sub:'단백질 듬뿍 (10~11시)'},
    {s:'☀️ 낮', id:'snack', l:'오후 간식', sub:'견과 + 계란 or 셰이크'},
    {s:'🏋️ 운동', id:'workout', l:'근력 운동', sub:'초저녁으로 당기기'},
    {s:'🏋️ 운동', id:'post', l:'운동 후 보충 + 크레아틴'},
    {s:'🌙 취침 전', id:'mag', l:'마그네슘'},
    {s:'🌙 취침 전', id:'sleep', l:'취침', sub:'주말엔 조금 더 푹'},
  ]},
  sun: {label:'일요일 · 리커버리 (운동 X)', items:[
    {s:'🌅 아침', id:'wake', l:'기상 시간', sub:'푹 자고 일어난 시각', time:true},
    {s:'🌅 아침', id:'wt', l:'몸무게 측정', weight:true},
    {s:'🌅 아침', id:'amsup', l:'소금물 + 공복 영양제', sub:'유산균·B·C·NMN'},
    {s:'🍳 브런치', id:'brunch', l:'브런치 + 오메가3', sub:'단백질 챙긴 가벼운 한 끼'},
    {s:'🍽️ 자유', id:'free', l:'여유 한 끼 (선택)', sub:'즐기되 폭식은 NO'},
    {s:'💊 매일', id:'creatine', l:'크레아틴 5g', sub:'쉬는 날도 거르지 않기!'},
    {s:'🧊 준비', id:'mealprep', l:'밀프렙', sub:'계란 삶기·견과 소분·약통 채우기'},
    {s:'🌙 취침 전', id:'mag', l:'마그네슘'},
    {s:'🌙 취침 전', id:'sleep', l:'취침'},
  ]},
};
function dayType(d){const w=d.getDay();return w===6?'sat':w===0?'sun':'weekday';}

// ---------- date helpers ----------
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseISO(s){const[y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
const WD=['일','월','화','수','목','금','토'];

let curDate = new Date();
let cache = {};       // iso -> {checks:{}, weight:null, note:''}
let saveTimer = null;

// ---------- storage ----------
async function loadDay(key){
  if(cache[key]) return cache[key];
  let data={checks:{},weight:null,wake:null,note:''};
  try{ const r=await STORE.get('day:'+key); if(r&&r.value) data=Object.assign(data,JSON.parse(r.value)); }
  catch(e){ /* no data yet */ }
  cache[key]=data; return data;
}
async function saveDay(key){
  const data=cache[key]; if(!data) return;
  try{ await STORE.set('day:'+key, JSON.stringify(data)); flashSaved(); }
  catch(e){ console.error('save fail',e); }
}
function queueSave(key){clearTimeout(saveTimer); saveTimer=setTimeout(()=>saveDay(key),400);}
function flashSaved(){const t=document.getElementById('saveTag');t.textContent='✓ 저장됨';t.style.opacity=1;
  setTimeout(()=>{t.style.opacity=0;},1200);}

// ---------- completion ----------
function completion(data, set){
  const items=set.items, total=items.length; let done=0;
  for(const it of items){
    if(it.weight){ if(data.weight!=null && data.weight!=='') done++; }
    else if(it.time){ if(data.wake) done++; }
    else if(data.checks[it.id]) done++;
  }
  return {done,total,ratio:total?done/total:0};
}

// ---------- render TODAY ----------
async function renderToday(){
  const key=iso(curDate);
  const set=SETS[dayType(curDate)];
  const data=await loadDay(key);

  // date labels
  const tISO=iso(new Date());
  document.getElementById('dateMain').textContent=`${curDate.getMonth()+1}월 ${curDate.getDate()}일 (${WD[curDate.getDay()]})`;
  document.getElementById('dateSub').textContent = key===tISO?'오늘':key;
  document.getElementById('dayTypeLabel').textContent=set.label;

  // checklist
  const cl=document.getElementById('checklist'); cl.innerHTML='';
  let lastSec=null;
  set.items.forEach(it=>{
    if(it.s!==lastSec){const h=document.createElement('div');h.className='sec-h';h.textContent=it.s;cl.appendChild(h);lastSec=it.s;}
    if(it.weight) return; // weight handled in top box
    if(it.time){
      const done=!!data.wake;
      const el=document.createElement('div');
      el.className='item time-item'+(done?' done':'');
      el.innerHTML=`<div class="cb">${done?'✓':'⏰'}</div><div class="lab">${it.l}${it.sub?`<span class="sub">${it.sub}</span>`:''}</div><input type="time" class="timein" value="${data.wake||''}">`;
      const inp=el.querySelector('.timein');
      inp.onchange=()=>{ data.wake=inp.value||null; queueSave(key); renderToday(); };
      cl.appendChild(el);
      return;
    }
    const checked=!!data.checks[it.id];
    const el=document.createElement('div');
    el.className='item'+(checked?' done':'');
    el.innerHTML=`<div class="cb">${checked?'✓':''}</div><div class="lab">${it.l}${it.sub?`<span class="sub">${it.sub}</span>`:''}</div>`;
    el.onclick=()=>{ data.checks[it.id]=!data.checks[it.id]; queueSave(key); updateRing(data,set); renderToday(); };
    cl.appendChild(el);
  });
  // (weight item header still shows under 아침; weight box is in toprow)

  // weight
  const wi=document.getElementById('weightInput');
  wi.value = (data.weight!=null?data.weight:'');
  wi.oninput=()=>{ data.weight = wi.value===''?null:parseFloat(wi.value); queueSave(key); updateRing(data,set); };
  await updateWeightDelta(key,data);

  // note
  const ni=document.getElementById('noteInput');
  ni.value=data.note||'';
  ni.oninput=()=>{ data.note=ni.value; queueSave(key); };

  updateRing(data,set);
}
function updateRing(data,set){
  const {done,total,ratio}=completion(data,set);
  const C=2*Math.PI*33;
  document.getElementById('ringFg').style.strokeDashoffset = C*(1-ratio);
  document.getElementById('pctNum').textContent=Math.round(ratio*100)+'%';
  document.getElementById('pctCnt').textContent=`${done}/${total}`;
  const enc=document.getElementById('encourage');
  if(ratio===0) enc.textContent='오늘도 한 칸씩 채워봐요 💪';
  else if(ratio<0.5) enc.textContent='좋은 출발이에요, 계속 가요!';
  else if(ratio<1) enc.textContent='거의 다 왔어요! 마무리만 남았네요 🔥';
  else enc.textContent='완벽한 하루! 정말 잘했어요 🎉';
}
async function updateWeightDelta(key,data){
  const el=document.getElementById('weightDelta'); el.textContent='';
  if(data.weight==null) return;
  // find previous day with weight
  for(let i=1;i<=14;i++){
    const pk=iso(addDays(parseISO(key),-i));
    const pd=await loadDay(pk);
    if(pd.weight!=null){
      const diff=+(data.weight-pd.weight).toFixed(1);
      if(diff===0){el.textContent='±0';el.className='delta';}
      else if(diff<0){el.textContent=`▼ ${Math.abs(diff)}`;el.className='delta down';}
      else{el.textContent=`▲ ${diff}`;el.className='delta up';}
      return;
    }
  }
}

// ---------- date nav ----------
function changeDate(n){curDate=addDays(curDate,n); if(curDate>new Date()) curDate=new Date(); renderToday();}
function goToday(){curDate=new Date(); renderToday();}

// ---------- TAB switch ----------
function switchTab(t){
  document.getElementById('tab-today').classList.toggle('active',t==='today');
  document.getElementById('tab-record').classList.toggle('active',t==='record');
  document.getElementById('view-today').classList.toggle('hidden',t!=='today');
  document.getElementById('view-record').classList.toggle('hidden',t!=='record');
  if(t==='record') renderRecord();
}

// ---------- render RECORD ----------
async function renderRecord(){
  const body=document.getElementById('recordBody');
  body.innerHTML='<div class="loading">기록 불러오는 중…</div>';

  // collect all stored days
  let keys=[];
  try{ const r=await STORE.list('day:'); if(r&&r.keys) keys=r.keys.map(k=>k.replace('day:','')); }
  catch(e){ keys=[]; }
  // ensure all loaded
  await Promise.all(keys.map(k=>loadDay(k)));

  const today=new Date(); const tISO=iso(today);

  // --- build last 5 weeks grid (Mon-start) ---
  const dow=(today.getDay()+6)%7; // 0=Mon
  const thisMon=addDays(today,-dow);
  const start=addDays(thisMon,-28); // 5 weeks
  let cells='';
  for(let i=0;i<35;i++){
    const d=addDays(start,i); const k=iso(d);
    const future = d>today;
    let lvl=0, ratio=0;
    if(!future && cache[k]){ ratio=completion(cache[k],SETS[dayType(d)]).ratio;
      lvl = ratio===0?0:ratio<0.34?1:ratio<0.67?2:ratio<1?3:4; }
    const cls=['cell','l'+lvl, future?'future':'', k===tISO?'today':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" title="${k} · ${Math.round(ratio*100)}%">${d.getDate()}</div>`;
  }

  // --- stats ---
  let logged=0, sumRatio=0;
  keys.forEach(k=>{ const d=cache[k]; const set=SETS[dayType(parseISO(k))];
    const c=completion(d,set); if(c.done>0||(d.weight!=null)){logged++; sumRatio+=c.ratio;} });
  const avg = logged? Math.round(sumRatio/logged*100):0;

  // streak (>=70%, ending today or yesterday)
  let streak=0; let d=new Date(today);
  const todayRatio = cache[tISO]?completion(cache[tISO],SETS[dayType(today)]).ratio:0;
  if(todayRatio<0.7) d=addDays(d,-1);
  while(true){const k=iso(d); const cd=cache[k]; if(!cd) break;
    const r=completion(cd,SETS[dayType(d)]).ratio; if(r>=0.7){streak++; d=addDays(d,-1);} else break;}

  // --- weight series ---
  const wseries=keys.filter(k=>cache[k].weight!=null).map(k=>({k,w:cache[k].weight}))
    .sort((a,b)=>a.k<b.k?-1:1);
  let weightBlock;
  if(wseries.length===0){
    weightBlock=`<div class="block"><h3>⚖️ 몸무게 추이</h3><div class="empty">아침에 몸무게를 입력하면<br>여기에 추이가 그려져요.</div></div>`;
  }else{
    const first=wseries[0], last=wseries[wseries.length-1];
    const delta=+(last.w-first.w).toFixed(1);
    const dCls=delta<0?'down':delta>0?'up':'';
    const dTxt=delta<0?`▼ ${Math.abs(delta)}kg`:delta>0?`▲ ${delta}kg`:'변화 없음';
    weightBlock=`<div class="block"><h3>⚖️ 몸무게 추이</h3>
      <div class="wstat"><div class="big">${last.w}<small> kg</small></div>
      <div>시작 ${first.w}kg → <span class="delta ${dCls}" style="font-size:13px">${dTxt}</span></div></div>
      ${sparkline(wseries.slice(-21))}</div>`;
  }

  body.innerHTML=`
    <div class="statgrid">
      <div class="scard fire"><div class="sv">${streak}<small>일</small></div><div class="sl">🔥 연속 기록</div></div>
      <div class="scard"><div class="sv">${avg}<small>%</small></div><div class="sl">평균 달성률</div></div>
      <div class="scard"><div class="sv">${logged}<small>일</small></div><div class="sl">총 기록</div></div>
    </div>
    <div class="block">
      <h3>📅 최근 5주 달성률</h3>
      <div class="hm-head"><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div><div>일</div></div>
      <div class="hm">${cells}</div>
      <div class="legend">적음 <i style="background:var(--c0)"></i><i style="background:var(--c1)"></i><i style="background:var(--c2)"></i><i style="background:var(--c3)"></i><i style="background:var(--c4)"></i> 많음</div>
    </div>
    ${weightBlock}
    <div class="danger"><button onclick="resetAll()">모든 기록 초기화</button></div>
  `;
}

function sparkline(series){
  if(series.length<2){return `<div class="empty" style="padding:10px 0">기록이 2개 이상 쌓이면<br>그래프가 그려져요. (현재 ${series.length}개)</div>`;}
  const W=640,H=110,P=14;
  const ws=series.map(s=>s.w); const min=Math.min(...ws),max=Math.max(...ws);
  const rng=(max-min)||1;
  const pts=series.map((s,i)=>{
    const x=P+(W-2*P)*(i/(series.length-1));
    const y=P+(H-2*P)*(1-(s.w-min)/rng);
    return [x,y];
  });
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pts[0][0].toFixed(1)} ${H-P} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[pts.length-1][0].toFixed(1)} ${H-P} Z`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#2f5d3a"/>`).join('');
  return `<svg class="wchart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${area}" fill="#2f5d3a" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="#2f5d3a" stroke-width="2.5" stroke-linejoin="round"/>${dots}
  </svg>`;
}

async function resetAll(){
  if(!confirm('정말 모든 루틴 기록과 몸무게를 삭제할까요?\n이 작업은 되돌릴 수 없어요.')) return;
  try{
    const r=await STORE.list('day:');
    if(r&&r.keys) await Promise.all(r.keys.map(k=>STORE.delete(k)));
  }catch(e){console.error(e);}
  cache={}; renderRecord();
}

// ---------- init ----------
(async function init(){
  if(!STORE){ document.querySelector('.wrap').innerHTML='<div class="loading">이 트래커는 Claude 아티팩트 환경에서 저장 기능이 동작해요.</div>'; return; }
  await renderToday();
})();
</script>
